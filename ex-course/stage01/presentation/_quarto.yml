project:
  title: "presentation"
  output-dir: "_output"

standalone: true
self-contained: true
slide-level: 2
lang: ru-RU

crossref:
  lof-title: "Список иллюстраций"
  lot-title: "Список таблиц"
  lol-title: "Листинги"

format:

  beamer:
    pdf-engine: xelatex
  
    toc: true
    toc-title: "Содержание"
  
    number-sections: false
    number-depth: 1
    toc-depth: 1
  
    aspectratio: 169
  
    incremental: true
    section-titles: true
  
    fontsize: 11pt
  
    fig-width: 8
    fig-height: 5
  
    fig-align: center
  
    keep-tex: true
  
    mainfont: "DejaVu Serif"
  
    theme: Madrid
  
    colortheme: default
  
    fonttheme: professionalfonts
  
    babel-lang: russian
    babel-otherlangs: english
    
  revealjs:
    transition: slide
    margin: 0.2
    smaller: true
    slide-number: true
    output-ext: html
    theme: beige
    logo: _resources/image/logo_rudn.png
